[connectivity]

# --- 1. Kernel Instantiation (nk) ---
nk=graphyflow_little:4
nk=graphyflow_big:4
nk=apply_kernel:1
nk=little_merger:1
nk=big_merger:1
nk=little_prop_loader:4
nk=big_prop_loader:4

# --- 2. Memory Port Mapping (sp) ---

# -- Mapping for instance: graphyflow_little_1 --
sp=graphyflow_little_1.edge_props:DDR[0]

# -- Mapping for instance: graphyflow_little_2 --
sp=graphyflow_little_2.edge_props:DDR[0]

# -- Mapping for instance: graphyflow_little_3 --
sp=graphyflow_little_3.edge_props:DDR[3]

# -- Mapping for instance: graphyflow_little_4 --
sp=graphyflow_little_4.edge_props:DDR[3]

# -- Mapping for instance: graphyflow_big_1 --
sp=graphyflow_big_1.edge_props:DDR[2]

# -- Mapping for instance: graphyflow_big_2 --
sp=graphyflow_big_2.edge_props:DDR[1]

# -- Mapping for instance: graphyflow_big_3 --
sp=graphyflow_big_3.edge_props:DDR[1]

# -- Mapping for instance: graphyflow_big_4 --
sp=graphyflow_big_4.edge_props:DDR[2]

# -- Mapping for instance: little_prop_loader_1 --
sp=little_prop_loader_1.src_prop:DDR[0]

# -- Mapping for instance: little_prop_loader_2 --
sp=little_prop_loader_2.src_prop:DDR[0]

# -- Mapping for instance: little_prop_loader_3 --
sp=little_prop_loader_3.src_prop:DDR[3]

# -- Mapping for instance: little_prop_loader_4 --
sp=little_prop_loader_4.src_prop:DDR[3]

# -- Mapping for instance: big_prop_loader_1 --
sp=big_prop_loader_1.src_prop:DDR[2]

# -- Mapping for instance: big_prop_loader_2 --
sp=big_prop_loader_2.src_prop:DDR[1]

# -- Mapping for instance: big_prop_loader_3 --
sp=big_prop_loader_3.src_prop:DDR[1]

# -- Mapping for instance: big_prop_loader_4 --
sp=big_prop_loader_4.src_prop:DDR[2]

# -- Mapping for instance: apply_kernel_1 --
sp=apply_kernel_1.node_props:DDR[1]
sp=apply_kernel_1.output:DDR[1]

# --- 3. Stream Connections ---

# -- Stream connections for graphyflow_little_1 --
stream_connect=graphyflow_little_1.ppb_req_stream:little_prop_loader_1.ppb_req_stream
stream_connect=little_prop_loader_1.ppb_resp_stream:graphyflow_little_1.ppb_resp_stream
stream_connect=graphyflow_little_1.kernel_out_stream:little_merger_1.little_kernel_1_out_stream:16

# -- Stream connections for graphyflow_little_2 --
stream_connect=graphyflow_little_2.ppb_req_stream:little_prop_loader_2.ppb_req_stream:16
stream_connect=little_prop_loader_2.ppb_resp_stream:graphyflow_little_2.ppb_resp_stream:16
stream_connect=graphyflow_little_2.kernel_out_stream:little_merger_1.little_kernel_2_out_stream

# -- Stream connections for graphyflow_little_3 --
stream_connect=graphyflow_little_3.ppb_req_stream:little_prop_loader_3.ppb_req_stream:16
stream_connect=little_prop_loader_3.ppb_resp_stream:graphyflow_little_3.ppb_resp_stream:16
stream_connect=graphyflow_little_3.kernel_out_stream:little_merger_1.little_kernel_3_out_stream:16

# -- Stream connections for graphyflow_little_4 --
stream_connect=graphyflow_little_4.ppb_req_stream:little_prop_loader_4.ppb_req_stream
stream_connect=little_prop_loader_4.ppb_resp_stream:graphyflow_little_4.ppb_resp_stream
stream_connect=graphyflow_little_4.kernel_out_stream:little_merger_1.little_kernel_4_out_stream:16

# -- Stream connections for graphyflow_big_1 --
stream_connect=graphyflow_big_1.cacheline_req_stream:big_prop_loader_1.cacheline_req_stream:16
stream_connect=big_prop_loader_1.cacheline_resp_stream:graphyflow_big_1.cacheline_resp_stream:16
stream_connect=graphyflow_big_1.kernel_out_stream:big_merger_1.big_kernel_1_out_stream

# -- Stream connections for graphyflow_big_2 --
stream_connect=graphyflow_big_2.cacheline_req_stream:big_prop_loader_2.cacheline_req_stream:16
stream_connect=big_prop_loader_2.cacheline_resp_stream:graphyflow_big_2.cacheline_resp_stream:16
stream_connect=graphyflow_big_2.kernel_out_stream:big_merger_1.big_kernel_2_out_stream:16

# -- Stream connections for graphyflow_big_3 --
stream_connect=graphyflow_big_3.cacheline_req_stream:big_prop_loader_3.cacheline_req_stream
stream_connect=big_prop_loader_3.cacheline_resp_stream:graphyflow_big_3.cacheline_resp_stream
stream_connect=graphyflow_big_3.kernel_out_stream:big_merger_1.big_kernel_3_out_stream:16

# -- Stream connections for graphyflow_big_4 --
stream_connect=graphyflow_big_4.cacheline_req_stream:big_prop_loader_4.cacheline_req_stream:16
stream_connect=big_prop_loader_4.cacheline_resp_stream:graphyflow_big_4.cacheline_resp_stream:16
stream_connect=graphyflow_big_4.kernel_out_stream:big_merger_1.big_kernel_4_out_stream

# -- Stream connections for little_merger_1 --
stream_connect=little_merger_1.kernel_out_stream:apply_kernel_1.little_kernel_out_stream

# -- Stream connections for big_merger_1 --
stream_connect=big_merger_1.kernel_out_stream:apply_kernel_1.big_kernel_out_stream

# --- 4. SLR Placement ---
slr=graphyflow_little_1:SLR0
slr=graphyflow_little_2:SLR0
slr=graphyflow_little_3:SLR2
slr=graphyflow_little_4:SLR2
slr=graphyflow_big_1:SLR0
slr=graphyflow_big_2:SLR2
slr=graphyflow_big_3:SLR1
slr=graphyflow_big_4:SLR1
slr=apply_kernel_1:SLR1
slr=little_merger_1:SLR1
slr=big_merger_1:SLR1
slr=little_prop_loader_1:SLR0
slr=little_prop_loader_2:SLR0
slr=little_prop_loader_3:SLR2
slr=little_prop_loader_4:SLR2
slr=big_prop_loader_1:SLR0
slr=big_prop_loader_2:SLR2
slr=big_prop_loader_3:SLR1
slr=big_prop_loader_4:SLR1
